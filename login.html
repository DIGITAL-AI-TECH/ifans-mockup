<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Entrar — ifans</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layouts.css">
</head>
<body>
<div class="page-public">

  <!-- Header com logo centralizado -->
  <header style="height:56px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--color-border-subtle)">
    <a href="index.html">
      <img src="logos/logo-negative.svg" alt="ifans" style="height:30px;width:auto">
    </a>
  </header>

  <!-- Formulario de login -->
  <main style="padding:40px 24px 40px;max-width:480px;margin:0 auto">

    <div style="text-align:center;margin-bottom:32px">
      <h1 style="font-size:24px;font-weight:800;margin-bottom:8px">Bem-vindo de volta</h1>
      <p style="font-size:14px;color:var(--color-text-tertiary)">Entre na sua conta para continuar</p>
    </div>

    <form action="feed.html" method="get">

      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);display:flex;align-items:center;pointer-events:none">
            <img src="icons/at-sign.svg" alt="" aria-hidden="true" style="width:18px;height:18px;opacity:0.4">
          </span>
          <input
            id="email"
            type="email"
            name="email"
            class="form-input"
            placeholder="seu@email.com"
            autocomplete="email"
            style="padding-left:42px"
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="senha">Senha</label>
        <div style="position:relative">
          <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);display:flex;align-items:center;pointer-events:none">
            <img src="icons/lock.svg" alt="" aria-hidden="true" style="width:18px;height:18px;opacity:0.4">
          </span>
          <input
            id="senha"
            type="password"
            name="senha"
            class="form-input"
            placeholder="Sua senha"
            autocomplete="current-password"
            style="padding-left:42px"
          >
        </div>
        <div style="text-align:right;margin-top:8px">
          <a href="#" style="font-size:13px;color:var(--color-text-brand);font-weight:600">Esqueci minha senha</a>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
        <img src="icons/unlock.svg" alt="" aria-hidden="true" style="width:18px;height:18px;filter:brightness(0) invert(1)">
        Entrar
      </button>

    </form>

    <!-- Separador -->
    <div style="display:flex;align-items:center;gap:12px;margin:24px 0">
      <div style="flex:1;height:1px;background:var(--color-border-default)"></div>
      <span style="font-size:13px;color:var(--color-text-tertiary);white-space:nowrap">ou</span>
      <div style="flex:1;height:1px;background:var(--color-border-default)"></div>
    </div>

    <!-- Link criar conta -->
    <a href="register.html" class="btn btn-secondary btn-full">
      Criar conta gratis
    </a>

    <!-- Termos -->
    <p style="font-size:12px;color:var(--color-text-tertiary);text-align:center;margin-top:32px;line-height:1.6">
      Ao entrar, voce concorda com os
      <a href="#" style="color:var(--color-text-secondary);text-decoration:underline">Termos de Uso</a>
      e a
      <a href="#" style="color:var(--color-text-secondary);text-decoration:underline">Politica de Privacidade</a>
      da ifans.
    </p>

  </main>

</div>
</body>
</html>
